<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bar Le Terrazze | wOrkee Palermo</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&display=swap');
        
        body { font-family: 'Montserrat', sans-serif; margin: 0; color: #333; background: #f9f9f9; }

        .header-locale { 
            height: 40vh; 
            background: linear-gradient(rgba(0,0,0,0.3), rgba(0,0,0,0.3)), url('img/locale1.jpg') center/cover; 
            background-attachment: fixed;
        }

        .container { 
            max-width: 900px; 
            margin: -80px auto 60px; 
            background: white; 
            padding: 40px; 
            border-radius: 20px; 
            box-shadow: 0 15px 50px rgba(0,0,0,0.1); 
            position: relative; 
            z-index: 2;
        }

        .info-tag { 
            display: inline-block; 
            background: #e0f2f2; 
            color: #006B6B; 
            padding: 6px 15px; 
            border-radius: 30px; 
            font-size: 0.7rem; 
            font-weight: 700; 
            margin-bottom: 15px; 
            text-transform: uppercase;
        }

        h1 { color: #006B6B; text-transform: uppercase; margin: 0 0 20px 0; font-size: 2.5rem; }

        /* SEZIONE MAPPA - STRISCIA PANORAMICA */
        .location-section { margin: 40px 0; }

        .map-wrapper {
            width: 100%;
            height: 180px; /* Effetto striscia */
            border-radius: 15px;
            overflow: hidden;
            border: 1px solid #eee;
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
        }

        .address-link {
            display: inline-block;
            margin-bottom: 10px;
            color: #006B6B;
            text-decoration: none;
            font-weight: 700;
        }

        .booking-section { margin-top: 50px; text-align: center; border-top: 2px solid #f0f0f0; padding-top: 40px; }

        .tidycal-container { width: 100%; height: 800px; border-radius: 15px; overflow: hidden; margin-top: 20px; }

        @media (max-width: 768px) {
            .container { width: 92%; padding: 25px; }
            .tidycal-container { height: 950px; }
        }
    </style>
</head>
<body>

    <div class="header-locale"></div>

    <div class="container">
        <a href="index.html" style="color: #006B6B; text-decoration: none; font-weight: 700; font-size: 0.8rem;">← TORNA ALLA LISTA</a>
        <br><br>
        
        <div class="info-tag">Mondello - Palermo</div>
        <h1>Bar Le Terrazze</h1>
        
        <p>Lavora con una vista mozzafiato a pochi passi dal mare di Mondello.</p>

        <div class="location-section">
            <h3>Dove siamo</h3>
            <a href="https://www.google.com/maps/search/?api=1&query=Viale+Regina+Elena+Palermo" target="_blank" class="address-link">
                📍 V.le Regina Elena, 90149 Palermo PA
            </a>
            <div class="map-wrapper">
                <iframe 
                    src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3142.13456789!2d13.3283!3d38.1995!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x12d9510000000000%3A0x0!2sViale+Regina+Elena%2C+90149+Palermo+PA!5e0!3m2!1sit!2sit!4v1712456789012!5m2!1sit!2sit" 
                    width="100%" 
                    height="100%" 
                    style="border:0;" 
                    allowfullscreen="" 
                    loading="lazy">
                </iframe>
            </div>
        </div>

        <div class="booking-section">
            <h2>Prenota la tua postazione</h2>
            <div class="tidycal-container">
                <iframe src="https://tidycal.com/w0rkee/bar-le-terrazze" style="width:100%; height:100%; border:none;"></iframe>
            </div>
        </div>
    </div>

</body>
</html>
